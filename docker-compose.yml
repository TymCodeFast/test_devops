services:
  web:
    build: ./
    ports:
      - "8091:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:example@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: example
    ports:
      - "55433:5432"
    volumes:
      - pgdata: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: