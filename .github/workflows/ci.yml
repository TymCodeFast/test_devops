name: DevOps CI Pipeline

on: 
  push: 
    branches: 
      - main
jobs:
  build-and-test:
    runs-on: ubunto-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-app .
      
      - name: Run container
        run: docker run -d -p 5000:5000 --name app devops-app
      
      - name: Wait for app
        run: sleep 5

      - name: Test Api
        run: curl --fail http://localhost:5000 || exit 1
      
      - name: Stop container
        run: docker stop app