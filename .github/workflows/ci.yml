name: DevOps CI Pipeline

on: 
  push: 
    branches: 
      - main
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run tests (Python)
        run: PYTHONPATH=src pytest tests

      - name: Build Docker image
        run: docker build -t devops-app .
      
      - name: Run container
        run: docker run -d -p 5000:5000 --name app devops-app
      
      - name: Wait for app
        run: sleep 5

      - name: Test Api
        run: curl --fail http://localhost:5000 || exit 1
      
      - name: Stop container
        run: docker stop app