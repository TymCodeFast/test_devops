- name: Create deploy directory
  file:
    path: /opt/devops
    state: directory
    mode: '0755'

- name: Copy docker-compose file
  copy:
    src: docker-compose.yml
    dest: /opt/devops/docker-compose.yml


- name: Copy Prometheus config
  copy:
    src: prometheus.yml
    dest: /opt/devops/prometheus.yml
  
- name: Copy Grafana datasource config
  copy:
    src: grafana-datasource.yml
    dest: /opt/devops/grafana-datasource.yml

- name: Pull and start containers
  community.docker.docker_compose_v2:
    project_src: /opt/devops
    pull: always
    state: present
  
- name: Install Python Docker SDK
  apt:
    name:
      - python3-docker
    state: present
